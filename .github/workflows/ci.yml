name: Python CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-check:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install flake8
      run: pip install flake8

    - name: Check syntax errors only
      run: |
        # Only check for syntax errors and undefined names
        # Skip import errors (E401) since ML packages not installed in CI
        flake8 . --count --select=E9,F63,F7 --show-source --statistics --exclude=.github
